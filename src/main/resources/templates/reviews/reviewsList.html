<!DOCTYPE html>
<html lang="en">
<head th:replace="~{layout/head :: head('Lista de Reviews')}">
    <meta charset="UTF-8">
<link rel="stylesheet"  th:href="@{/css/reviews.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">
    <h1 style="color:black" class="mb-4">Lista de Reviews</h1>

    <!-- Botón para crear nueva (Solo uno, arriba de la lista) -->
    <div class="mb-3">
        <a th:href="@{/reviews/new}" class="btn btn-primary">
            <i class="fa-solid fa-plus me-1"></i> Nueva Review
        </a>
    </div>

    <!-- Contenedor Principal Flex -->
    <div class="d-flex gap-4 align-items-start">

        <!-- Columna de Imágenes (Izquierda) -->
        <div class="d-flex flex-column gap-3 flex-shrink-0" style="width: 200px;">
            <div class="text-center">
                <img th:src="@{https://bodymania.com/cdn/shop/files/sophbSJk.png?v=1730919445&width=1946}"
                     alt="Logo 1" class="img-fluid rounded shadow-sm" width="150" height="auto">

                <!-- 2nda imagen -->
                <img th:src="@{https://imgs.search.brave.com/QxyiZt2DWpX8N-go0NCSbAlUxDJKVNMk_9-6GcBQVSU/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93d3cu/aHNuc3RvcmUuY29t/L21lZGlhL2NhdGFs/b2cvcHJvZHVjdC9j/YWNoZS81YTE1YzU5/ODhhZmI0OTI5YTI1/MDExNjlhMzc0NjBl/Yy9oL2kvaGlnaC1w/cm90ZWluLXJpY2Ut/Y3JlYW0tbmV1dHJh/bC01MDBnLWZyb250/LWhzbl8xXzEud2Vi/cA}"

                     alt="Crema de arroz" class="img-fluid rounded shadow-sm" width="150" height="auto">

                <!-- Tercera imagen (aparecerá debajo de la 2nda) -->

                <img th:src="@{https://imgs.search.brave.com/8Su7Icxn-hx0Zf_KmjqBkN79zTXlsdMfDZra0T99qBU/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9ub2ds/dXRlbnRlYW0uZXMv/d3AtY29udGVudC91/cGxvYWRzLzIwMjUv/MDUvMTQ4MTcwMmVm/NWMwMDNkMjIwYzZk/NWQwNjExYTg4YzQu/anBn }"

                     alt="Proteina why isolate de chocolate" class="img-fluid rounded shadow-sm" width="150" height="auto">

            </div>
        </div>

        <!-- Columna de Reviews (Derecha) -->
        <div class="flex-grow-1 d-flex flex-column">
            <!-- Bucle para iterar las reviews de la base de datos -->
            <div class="review-card mb-3 bg-white p-3 border rounded shadow-sm w-100 position-relative" th:each="review : ${reviewsproductos}">
                <div class="accent-line" style="height: 4px; background-color: #007bff; width: 50px; margin-bottom: 10px;"></div>

                <div class="d-flex justify-content-between align-items-center">
                    <div class="review-title h5 mb-0" th:text="${review.title}">Título</div>

                    <!-- Botón Editar específico para esta Review -->
                    <a th:href="@{/reviews/edit/{id}(id=${review.id})}" class="btn btn-sm btn-outline-secondary">
                        <i class="fa-solid fa-pen"></i> Editar
                    </a>
                </div>

                <div class="stars my-2" style="color: #ffc107;">
                    <!-- Genera estrellas rellenas según el rating -->
                    <span th:each="i : ${#numbers.sequence(1, 5)}"
                          th:text="${review.rating >= i} ? '★' : '☆'"></span>
                </div>

                <div class="review-body text-muted" th:text="${review.comment}">Comentario</div>
            </div>
        </div>

    </div>
</main>

    <footer th:replace="~{layout/footer :: footer}"></footer>
    <script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
