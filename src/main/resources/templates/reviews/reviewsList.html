<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
</head>
<body>
<h1>Lista de Reviews </h1>
<p th:each="reviewsproductos: ${reviewsproductos}">
    <span th:text="${reviewsproductos.title}"></span>
    <span th:text="${reviewsproductos.comment}"></span>
    <span th:text="${reviewsproductos.rating}"></span>
</p>
</body>
</html>
