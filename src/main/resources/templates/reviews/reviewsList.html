<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Opiniones')}">
    <link rel="stylesheet" th:href="@{/css/reviews.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <div th:if="${message}" class="alert alert-success" role="alert">
        <i class="fa-solid fa-check-circle me-2"></i>
        <span th:text="${message}"></span>
    </div>

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
        <h1 class="section-title h2 mb-0">
            <span th:text="${currentPath == '/reviews/desactivated'} ? 'Opiniones Desactivadas' : 'Opiniones de clientes'"></span>
        </h1>

        <div class="d-flex gap-2">
            <a sec:authorize="isAuthenticated()" th:href="@{/reviews/new}"
               class="btn btn-success">
                <i class="fa-solid fa-plus me-1"></i> Nueva opinión
            </a>

            <a sec:authorize="hasRole('ADMIN')"
               th:if="${currentPath != '/reviews/desactivated'}"
               th:href="@{/reviews/desactivated}"
               class="btn btn-outline-secondary">
                <i class="fa-solid fa-eye-slash me-1"></i> Ver desactivadas
            </a>

            <a sec:authorize="hasRole('ADMIN')"
               th:if="${currentPath == '/reviews/desactivated'}"
               th:href="@{/reviews-productos}"
               class="btn btn-outline-primary">
                <i class="fa-solid fa-eye me-1"></i> Ver activas
            </a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(reviewsproductos)}" class="empty-state text-center py-5">
        <i class="fa-regular fa-comment-dots fa-2x text-muted mb-3 d-block"></i>
        <h5 class="mb-1">Aún no hay opiniones</h5>
        <p class="text-muted mb-0">¡Sé el primero en compartir tu experiencia!</p>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-12" th:each="review : ${reviewsproductos}">
            <div class="card review-card">
                <div class="card-body d-flex flex-column flex-sm-row gap-3">
                    <div class="flex-shrink-0 text-center">
                        <img th:if="${review.product != null}" th:src="${review.product.image}" alt="Producto"
                             class="rounded border object-fit-contain bg-white p-1" style="width:96px;height:96px;">
                        <div th:unless="${review.product != null}"
                             class="bg-light border rounded d-flex align-items-center justify-content-center"
                             style="width:96px;height:96px;">
                            <i class="fa-solid fa-box text-muted fa-lg"></i>
                        </div>
                    </div>

                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                            <div>
                                <h5 class="mb-1" th:text="${review.title}">Título</h5>
                                <div class="text-muted small d-flex flex-wrap gap-2 align-items-center">
                                    <span th:if="${review.product != null}" class="fw-semibold text-dark"
                                          th:text="${review.product.name}"></span>
                                    <span class="d-flex align-items-center gap-1">
                                        <img th:if="${review.user != null and review.user.imageUrl != null}"
                                             th:src="${review.user.imageUrl}"
                                             alt="Avatar"
                                             class="rounded-circle border"
                                             style="width:28px;height:28px;object-fit:cover;">
                                        <i th:unless="${review.user != null and review.user.imageUrl != null}"
                                           class="fa-solid fa-user"></i>
                                        <span th:if="${review.user == null}"
                                              class="fw-semibold text-secondary">Anónimo</span>
                                        <span th:if="${review.user != null}" th:text="${review.user.username}"
                                              style="color:#ff7a00;"></span>
                                    </span>
                                    <span th:unless="${review.createdAt == null}"
                                          class="d-flex align-items-center gap-1">
                                        <i class="fa-regular fa-calendar"></i>
                                        <span th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy')}"></span>
                                    </span>
                                </div>
                            </div>
                            <span class="badge text-bg-warning text-dark flex-shrink-0">
                                <i class="fa-solid fa-star me-1"></i><span th:text="${review.rating} + ' / 5'"></span>
                            </span>
                        </div>

                        <div class="rating-stars mb-2">
                            <span th:each="i : ${#numbers.sequence(1, 5)}"
                                  th:utext="${review.rating >= i} ? '&#9733;' : '&#9734;'"></span>
                        </div>

                        <p class="text-muted mb-3" th:text="${review.comment}">Comentario</p>

                        <div class="d-flex gap-2">
                            <a th:href="@{/reviews/detail/{id}(id=${review.id})}"
                               class="btn btn-sm btn-outline-secondary">
                                <i class="fa-solid fa-eye me-1"></i> Ver
                            </a>
                            <a sec:authorize="isAuthenticated()"
                               th:if="${currentUser != null and review.user != null and currentUser.id == review.user.id}"
                               th:href="@{/reviews/edit/{id}(id=${review.id})}"
                               class="btn btn-sm btn-outline-secondary">
                                <i class="fa-solid fa-pen me-1"></i> Editar
                            </a>
                            <div sec:authorize="hasRole('ADMIN')">
                                <a th:if="${review.active}"
                                   href="#"
                                   class="btn btn-sm btn-outline-danger"
                                   data-bs-toggle="modal"
                                   data-bs-target="#userActionModal"
                                   th:attr="data-url=@{/reviews/desactivate/{id}(id=${review.id})}, data-action='desactivar', data-name='esta opinión'">
                                    <i class="fa-solid fa-trash me-1"></i> Desactivar
                                </a>

                                <a th:unless="${review.active}"
                                   href="#"
                                   class="btn btn-sm btn-outline-success"
                                   data-bs-toggle="modal"
                                   data-bs-target="#userActionModal"
                                   th:attr="data-url=@{/reviews/activate/{id}(id=${review.id})}, data-action='activar', data-name='esta opinión'">
                                    <i class="fa-solid fa-check me-1"></i> Activar
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="userActionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar acción</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="modalMessage">¿Estás seguro?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <a id="confirmActionBtn" class="btn btn-danger" href="#">Confirmar</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script>
    const userActionModal = document.getElementById('userActionModal');

    let actionUrl = null;

    userActionModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;

        actionUrl = button.getAttribute('data-url');
        const action = button.getAttribute('data-action');
        // Capturamos el nuevo atributo data-name
        const entityName = button.getAttribute('data-name');
        const message = document.getElementById('modalMessage');
        const confirmBtn = document.getElementById('confirmActionBtn');
        // Usamos la variable entityName para que el mensaje sea natural
        message.textContent = `¿Seguro que quieres ${action} ${entityName}?`;
        confirmBtn.className =
            action === 'activar'
                ? 'btn btn-success'
                : 'btn btn-danger';
    });
    // CLICK DEL BOTÓN CONFIRMAR
    document.getElementById('confirmActionBtn').addEventListener('click', function () {
        if (actionUrl) {
            window.location.href = actionUrl;
        }
    });
</script>
</body>
</html>
