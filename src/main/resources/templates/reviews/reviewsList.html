<!DOCTYPE html>
<html lang="en">
<head th:replace="~{layout/head :: head('Lista de Rwviews')}"></head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">


<h1>Lista de Reviews </h1>
<img th:src="@{images/suplementos.jpg}" alt="Imagen de sumplementos" width="300" height="300">
<link rel="stylesheet" th:href="@{/css/reviews.css}">

<div class="review-card" th:each="review : ${reviewsproductos}">
    <div class="accent-line"></div>

    <div class="review-title" th:text="${review.title}">Título de la review</div>

    <div class="stars">
        <div class="star" th:classappend="${review.rating >= 1} ? 'filled'"></div>
        <div class="star" th:classappend="${review.rating >= 2} ? 'filled'"></div>
        <div class="star" th:classappend="${review.rating >= 3} ? 'filled'"></div>
        <div class="star" th:classappend="${review.rating >= 4} ? 'filled'"></div>
        <div class="star" th:classappend="${review.rating >= 5} ? 'filled'"></div>
    </div>
</div>
</main>
    <footer th:replace="~{layout/footer :: footer}"></footer>
    <script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
