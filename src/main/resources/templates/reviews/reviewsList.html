<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
</head>
<body>
<h1>Lista de Reviews </h1>
<ul>
<li th:each="reviews: ${reviewsproductos}">
    <span th:text="${reviews.title}"></span>
    <span th:text="${reviews.comment}"></span>
    <span th:text="${reviews.rating}"></span>
</li>
</ul>
</body>
</html>
