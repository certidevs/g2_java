<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Opiniones')}">
    <link rel="stylesheet" th:href="@{/css/reviews.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
        <h1 class="section-title h2 mb-0">Opiniones de clientes</h1>
        <a sec:authorize="isAuthenticated()" th:href="@{/reviews/new}" class="btn btn-primary">
            <i class="fa-solid fa-plus me-1"></i> Nueva opinión
        </a>
    </div>

    <div th:if="${#lists.isEmpty(reviewsproductos)}" class="empty-state text-center py-5">
        <i class="fa-regular fa-comment-dots fa-2x text-muted mb-3 d-block"></i>
        <h5 class="mb-1">Aún no hay opiniones</h5>
        <p class="text-muted mb-0">¡Sé el primero en compartir tu experiencia!</p>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-12" th:each="review : ${reviewsproductos}">
            <div class="card review-card">
                <div class="card-body d-flex flex-column flex-sm-row gap-3">
                    <div class="flex-shrink-0 text-center">
                        <img th:if="${review.product != null}" th:src="${review.product.image}" alt="Producto"
                             class="rounded border object-fit-contain bg-white p-1" style="width:96px;height:96px;">
                        <div th:unless="${review.product != null}" class="bg-light border rounded d-flex align-items-center justify-content-center"
                             style="width:96px;height:96px;">
                            <i class="fa-solid fa-box text-muted fa-lg"></i>
                        </div>
                    </div>

                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                            <div>
                                <h5 class="mb-1" th:text="${review.title}">Título</h5>
                                <div class="text-muted small d-flex flex-wrap gap-2 align-items-center">
                                    <span th:if="${review.product != null}" class="fw-semibold text-dark" th:text="${review.product.name}"></span>
                                    <span class="d-flex align-items-center gap-1">
                                        <img th:if="${review.user != null and review.user.imageUrl != null}"
                                             th:src="${review.user.imageUrl}"
                                             alt="Avatar"
                                             class="rounded-circle border"
                                             style="width:28px;height:28px;object-fit:cover;">
                                        <i th:unless="${review.user != null and review.user.imageUrl != null}" class="fa-solid fa-user"></i>
                                        <span th:if="${review.user == null}">Anónimo</span>
                                        <span th:if="${review.user != null}" th:text="${review.user.username}"></span>
                                    </span>
                                    <span th:unless="${review.createdAt == null}" class="d-flex align-items-center gap-1">
                                        <i class="fa-regular fa-calendar"></i>
                                        <span th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy')}"></span>
                                    </span>
                                </div>
                            </div>
                            <span class="badge text-bg-warning text-dark flex-shrink-0">
                                <i class="fa-solid fa-star me-1"></i><span th:text="${review.rating} + ' / 5'"></span>
                            </span>
                        </div>

                        <div class="rating-stars mb-2">
                            <span th:each="i : ${#numbers.sequence(1, 5)}" th:utext="${review.rating >= i} ? '&#9733;' : '&#9734;'"></span>
                        </div>

                        <p class="text-muted mb-3" th:text="${review.comment}">Comentario</p>

                        <div class="d-flex gap-2">
                            <a th:href="@{/reviews/detail/{id}(id=${review.id})}" class="btn btn-sm btn-outline-secondary">
                                <i class="fa-solid fa-eye me-1"></i> Ver
                            </a>
                            <a sec:authorize="isAuthenticated()" th:href="@{/reviews/edit/{id}(id=${review.id})}" class="btn btn-sm btn-outline-secondary">
                                <i class="fa-solid fa-pen me-1"></i> Editar
                            </a>
                            <a sec:authorize="hasRole('ADMIN')" th:href="@{/reviews/desactivate/{id}(id=${review.id})}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Desactivar esta opinión?')">
                                <i class="fa-solid fa-trash me-1"></i> Desactivar
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
