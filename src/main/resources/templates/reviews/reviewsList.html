<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">
<head th:replace="~{layout/head :: head('Lista de Reviews')}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Lista de Reviews</h1>
        <div>
            <a sec:authorized="hasAnyRole('USER','ADMIN')" th:href="@{/reviews/new}" class="btn btn-primary">
                <i class="fa-solid fa-plus me-1"></i> Nueva Review
            </a>
        </div>
    </div>

    <!-- Lista moderna de reviews: cards en una columna con separación y sombra -->
    <div class="row g-4">
        <div class="col-12" th:each="review : ${reviewsproductos}">
            <div class="card shadow-sm h-100 border-0">
                <div class="card-body d-flex gap-3">
                    <!-- Imagen / avatar del producto -->
                    <div class="flex-shrink-0">
                        <img th:if="${review.product != null}" th:src="${review.product.image}"
                             alt="Producto" class="rounded" style="width:96px; height:96px; object-fit:cover;">
                        <div th:unless="${review.product != null}" class="bg-secondary rounded" style="width:96px; height:96px;"></div>
                    </div>

                    <!-- Contenido principal -->
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <h5 class="card-title mb-1" th:text="${review.title}">Título de la review</h5>
                                <div class="text-muted small d-flex gap-2 align-items-center">
                                    <i class="fa-solid fa-user"></i>
                                    <span th:if="${review.user == null}">Usuario anónimo</span>
                                    <span th:if="${review.user != null}" th:text="${review.user.username}"></span>
                                    <span class="mx-2">•</span>
                                    <span th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}" th:unless="${review.createdAt == null}"></span>
                                </div>
                            </div>

                            <!-- Rating y acciones -->
                            <div class="text-end">
                                <div class="mb-2">
                                    <span class="badge bg-warning text-dark">
                                        <i class="fa-solid fa-star me-1"></i>
                                        <span th:text="${review.rating + ' / 5'}"></span>
                                    </span>
                                </div>
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/reviews/detail/{id}(id=${review.id})}" class="btn btn-outline-primary btn-sm">
                                        <i class="fa-solid fa-eye"></i>
                                    </a>
                                    <a sec:authorized="hasAnyRole('USER','ADMIN')" th:href="@{/reviews/edit/{id}(id=${review.id})}" class="btn btn-outline-secondary btn-sm">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/reviews/desactivate/{id}(id=${review.id})}" class="btn btn-danger btn-sm"
                                       onclick="return confirm('¿Estás seguro de que deseas desactivar esta review?')">
                                        <i class="fa-solid fa-trash"></i>
                                    </a>
                                </div>
                            </div>
                        </div>

                        <!-- Estrellas visuales -->
                        <div class="mb-2" style="color: #ffc107; font-size:1.05rem;">
                            <span th:each="i : ${#numbers.sequence(1, 5)}" th:utext="${review.rating >= i} ? '&#9733;' : '&#9734;'"></span>
                        </div>

                        <!-- Comentario -->
                        <p class="card-text text-muted mb-0" th:text="${review.comment}">Comentario de la review...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

    <footer th:replace="~{layout/footer :: footer}"></footer>
    <script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
