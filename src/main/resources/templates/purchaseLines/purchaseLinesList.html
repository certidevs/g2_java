    <div class="row g-3 mt-4">

        <div class="col-12" th:each="line : ${purchaseLines}">

            <div class="purchase-card p-2 d-flex align-items-center gap-3">

                <!-- IMAGEN -->
                <img th:src="${line.product.image}"
                     alt="producto"
                     style="width: 100px; height: 100px; object-fit: cover; border-radius: 15px;">

                <!-- INFO -->
                <div class="flex-grow-1">

                    <h5 class="mb-1" th:text="${line.product.name}"></h5>

                    <p class="text-muted small mb-1"
                       th:text="${line.product.shortDescription}">
                    </p>

                    <span th:if="${line.talla != null}"
                          class="badge bg-dark"
                          th:text="'Talla: ' + ${line.talla}">
                    </span>

                </div>

                <!-- CANTIDAD -->
                <div class="text-center">

                    <div class="d-flex align-items-center gap-2">

                        <a th:href="@{/purchase-lines/decrease/{id}(id=${line.id})}"
                           class="btn btn-sm btn-outline-danger rounded-pill">-</a>

                        <span class="fw-bold"
                              th:text="${line.quantity}"></span>

                        <a th:href="@{/purchase-lines/increase/{id}(id=${line.id})}"
                           class="btn btn-sm btn-outline-success rounded-pill">+</a>

                    </div>

                </div>

                <!-- PRECIO -->
                <div class="text-end">

                    <div class="purchase-price">
                        <span th:text="${#numbers.formatDecimal(line.product.price * line.quantity,1,2)}"></span> €
                    </div>

                    <a th:href="@{/products/{id}(id=${line.product.id})}"
                       class="btn btn-sm btn-black mt-2">
                        Ver
                    </a>

                </div>

            </div>

        </div>

    </div>
    <div class="purchase-header mt-1">

        <h3 class="mb-1">
            Total del carrito
        </h3>

        <div class="purchase-total">
            <span th:text="${#numbers.formatDecimal(total,1,2)}"></span> €
        </div>

    </div>
    <a th:if="${purchase}" th:href="@{/purchases/{id}(id=${purchase.id})}" class="btn-black">
        Ver Pedido
    </a>
    <hr>
    <h4>Agregar más productos</h4>
    <div class="album py-5 bg-body-tertiary container flex-grow-1 ">
        <div class="container">
            <div class="row">
                <div class="col-0">
                    <a th:href="@{/purchase-lines}" class="btn btn-sm btn-outline-info column">
                        <i class="fa-solid fa-arrow-up"></i>
                    </a>
                    <a th:href="@{/purchase-lines}" class="btn btn-sm btn-outline-info">
                        <i class="fa-solid fa-arrow-down"></i>
                    </a>
                    <div  class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
                        <div id="sombra" th:each="product : ${products}" class="col mt-4 mb-4">
                            <div>
                                <a th:href="@{/products/{id}(id=${product.id})}">
                                    <img th:src="${product.image}" class="card-img-top"  alt="..." role="img" width="400" height="400">
                                </a>
                                <div class="card-body" >
                                    <a th:href="@{/products/{id}(id=${product.id})}">
                                        <h5 class="card-title" th:text="${product.name}">Titulo</h5>
                                        <p class="card-text" th:text="${product.shortDescription}">Descripcion</p>
                                    </a>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <h2 class="align-items-start card-title" th:text="${product.price} + '€'">€</h2>
                                        <div class="btn-group">
                                            <a th:href="@{/products/{id}(id=${product.id})}" style="text-decoration: none; color: inherit;">
                                                <button th:href="@{/products}" type="button" class="btn btn-sm btn-outline-secondary">View</button>
                                            </a>

                                            <form th:action="@{/purchase-lines/create}" method="post">
                                                <input type="hidden"
                                                       name="productId"
                                                       th:value="${product.id}">
                                                <button type="submit"
                                                        class="btn btn-sm btn-outline-secondary">
                                                    <i class="fa-solid fa-cart-shopping"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
