<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Carrito')}"></head>
<body>
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<div class="container mt-4">
    <h1>Carrito</h1>
    <table class="table">
        <thead>
        <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Talla</th>
            <th>Seleccion</th>-->
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="line : ${purchaseLines}">
            <td th:text="${line.product.name}"></td>
            <td th:text="${#numbers.formatDecimal(line.product.price, 1, 2)} + '€'"></td>
            <td th:text="${#numbers.formatDecimal(line.product.price * line.quantity, 1, 2)} + '€'"></td>
           <!-- <td th:text="${line.talla}"></td> -->
            <!--<td th:if="${line.product.medidas != null}">
                <form th:action="@{/purchase-lines}" method="post">

                    <input type="hidden"
                           name="lineId"
                           th:value="${line.id}">

                    <input type="text"
                           name="talla"
                           th:value="${line.talla}"
                           placeholder="Talla"
                           required>

                    <button type="submit"
                            class="btn btn-sm btn-outline-primary mt-2">
                        Actualizar talla
                    </button>

                </form>
            </td>-->
            <td th:unless="${line.product.medidas != null}">
                -
            </td>
            <td>
                <a th:href="@{/purchase-lines/decrease/{id}(id=${line.id})}"
                   class="btn btn-sm btn-outline-danger">
                    -
                </a>
                <span class="mx-2"
                      th:text="${line.quantity}"></span>
                <a th:href="@{/purchase-lines/increase/{id}(id=${line.id})}"
                   class="btn btn-sm btn-outline-success">
                    +
                </a>
            </td>
            <td th:text="${line.product.price * line.quantity} + '€'"></td>
        </tr>
        </tbody>
    </table>
    <h3>
        Total:
        <span th:text="${#numbers.formatDecimal(total, 1, 2)} + '€'"></span>
    </h3>
    <a th:if="${purchase}" th:href="@{/purchases/{id}(id=${purchase.id})}" class="btn btn-success">
        Ver Pedido
    </a>
    <hr>
    <h4>Agregar más productos</h4>
    <div class="album py-5 bg-body-tertiary container flex-grow-1 ">
        <div class="container">
            <div class="row">
                <div class="col-0">
                    <a th:href="@{/purchase-lines}" class="btn btn-sm btn-outline-info column">
                        <i class="fa-solid fa-arrow-up"></i>
                    </a>
                    <a th:href="@{/purchase-lines}" class="btn btn-sm btn-outline-info">
                        <i class="fa-solid fa-arrow-down"></i>
                    </a>
                    <div  class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
                        <div id="sombra" th:each="product : ${products}" class="col mt-4 mb-4">
                            <div>
                                <a th:href="@{/products/{id}(id=${product.id})}">
                                    <img th:src="${product.image}" class="card-img-top"  alt="..." role="img" width="400" height="400">
                                </a>
                                <div class="card-body" >
                                    <a th:href="@{/products/{id}(id=${product.id})}">
                                        <h5 class="card-title" th:text="${product.name}">Titulo</h5>
                                        <p class="card-text" th:text="${product.shortDescription}">Descripcion</p>
                                    </a>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <h2 class="align-items-start card-title" th:text="${product.price} + '€'">€</h2>
                                        <div class="btn-group">
                                            <a th:href="@{/products/{id}(id=${product.id})}" style="text-decoration: none; color: inherit;">
                                                <button th:href="@{/products}" type="button" class="btn btn-sm btn-outline-secondary">View</button>
                                            </a>

                                            <form th:action="@{/purchase-lines/create}" method="post">
                                                <input type="hidden"
                                                       name="productId"
                                                       th:value="${product.id}">
                                                <button type="submit"
                                                        class="btn btn-sm btn-outline-secondary">
                                                    <i class="fa-solid fa-cart-shopping"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
                </div>

    </div>
</div>
