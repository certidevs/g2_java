<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Añadir al carrito')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="form-card">
        <h1 class="h3 mb-4"><i class="fa-solid fa-cart-plus text-primary me-2"></i> Añadir al carrito</h1>

        <div class="card">
            <div class="card-body p-4">
                <form th:action="@{/purchase-lines}" method="post" th:object="${purchaseLine}">
                    <input type="hidden" th:field="*{product.id}">
                    <input type="hidden" th:field="*{unitPrice}">
                    <input type="hidden" th:if="${category}" th:value="${category.id}">

                    <div class="mb-3" th:if="${purchaseLine.product}">
                        <label class="form-label fw-semibold">Producto</label>
                        <p class="form-control-plaintext mb-0" th:text="${purchaseLine.product.name}"></p>
                    </div>

                    <div class="mb-3" th:if="${category}">
                        <label class="form-label fw-semibold">Categoría</label>
                        <p class="form-control-plaintext mb-0" th:text="${category.name}"></p>
                    </div>

                    <div class="mb-3" th:if="${purchaseLine.product}">
                        <label class="form-label fw-semibold">Precio unitario</label>
                        <p class="form-control-plaintext mb-0" th:text="${purchaseLine.product.price} + ' €'"></p>
                    </div>

                    <div class="mb-4">
                        <label for="quantity" class="form-label">Cantidad</label>
                        <input type="number" class="form-control" id="quantity" th:field="*{quantity}"
                               min="1" value="1" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-cart-shopping me-1"></i> Añadir al carrito
                        </button>
                        <a th:href="@{/purchase-lines}" class="btn btn-outline-secondary">Volver al carrito</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
