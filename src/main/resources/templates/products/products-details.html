<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Five Chill GYM')}"></head>
<body class="d-flex flex-column min-vh-100">
<link rel="stylesheet" th:href="@{/css/products.css}">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="container text-center mt-5">
        <div class="row">
            <div class="col">
                <div class="row-cols-1 row-cols-md-1">
                    <img th:src="${product.image}" class="img-fluid" width="100%" alt="Responsive image">
                </div>
            </div>
            <div class="col" >
                <div class="row-cols-1 mt-5 mb-5 align-items-center">
                    <h1 th:text="${product.name}"></h1>
                </div>
                <div class="row-cols-1">
                        <h5 th:text="${product.longDescription}"></h5>
                </div>
                <div class="row-cols-1 mt-5 mb-5 align-items-start">
                    <h2 th:text="${product.price} + '€'" class="align-items-start"></h2>
                </div>
                <h5 class="text-start ">Categoria: </h5>
                <a th:if="${product.category != null}" th:href="@{/categories/{id}(id=${product.category.id})}" class="row-cols-1 mt-5 mb-5 border-dark-subtle rounded-3 btn btn-sm flex-">
                    <h5 th:text="${product.category.name}" class="text-start "></h5>
                </a>
                <a th:unless="${product.category != null}" class="row-cols-1 mt-5 mb-5 border-dark-subtle rounded-3 p-4">
                    <h5 class="text-center ">Sin categoría</h5>>
                </a>
            </div>
        </div>
    </div>
    <div class="container text-lg-end">
        <!-- TODO ENLAZAR BIEN A COMPRAR -->
<!--        <a th:href="@{/purchase-lines/create(productId=${product.id})}"  class="btn btn-sm btn-outline-secondary me-3">-->
<!--            <i class="fa-solid fa-cart-shopping"></i>-->
<!--            Añadir al carrito-->
<!--        </a>-->

        <form th:action="@{/purchase-lines/create}" method="post">
            <input type="hidden" name="productId" th:value="${product.id}">
            <button class="btn btn-sm btn-success">
                <i class="fa-solid fa-cart-shopping"></i>
                Añadir al carrito
            </button>
        </form>



        <a th:href="@{/products/edit/{id}(id=${product.id})}" style="text-decoration: none; color: inherit;" class="visually-hidden">
            <button type="button" class="btn btn-sm btn-secondary me-3">
                <i class="fa-solid fa-pencil me-1"></i>
                Editar
            </button>
        </a>
        <a th:href="@{/products}" style="text-decoration: none; color: inherit;">
        <button type="button" class="btn btn-sm btn-outline-secondary me-3">
            <i class="fa-solid fa-arrow-left"></i>
            Volver
        </button>
        </a>
        <!--<a th:href="@{/products/deactivate/{id}(id=${product.id})}" class="btn btn-sm btn-warning me-3 ">
            <i class="fa-solid fa-cart-shopping"></i>
            Baja
        </a>-->
    </div>
    <div th:if="${reviews != null}">
        <h1><i class="fa-solid fa-comment "></i>
        Opiniones de este producto </h1>
        <div class="row ">
            <div class="col" th:each="review : ${reviews}">
                <div class="card h-100 shadow-sm mt-4 mb-4 border-black">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0" th:text="${review.title}">Título</h5>
                            <span class="badge bg-warning text-dark">
                            <i class="fa-solid fa-star me-1"></i>
                                <span th:text="${review.rating + ' / 5'}"></span>
                            </span>
                        </div>
                        <p th:text="${review.comment}"></p>
                        <a th:href="@{/reviews/{id}(id=${review.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="fa-solid fa-pen"></i> Ver
                        </a>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>
    <div class="container text-center mt-5 mb-5 shadow-lg p-3 mb-5 bg-body rounded">
        <h2 class="mb-4 p-4">
            <i class="fa-solid fa-pen-to-square"></i>
            Danos tu opnión sobre este producto:
        </h2>
        <a  th:href="@{/reviews/new/{id}(id=${product.id})}" class="btn btn-primary">
            <i class="fa-solid fa-pen-to-square me-1"></i>
            Escribir una opinión
        </a>
    </div>
</main>

</body>
</html>
