<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Five Chill GYM')}"></head>
<body class="d-flex flex-column min-vh-100">
<link rel="stylesheet" th:href="@{/css/products.css}">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="container text-center">
        <div class="row">
            <div class="col">
                <div class="row-cols-1 row-cols-md-1">
                    <img th:src="${product.image}" class="img-fluid" width="100%" alt="Responsive image">
                </div>
            </div>
            <div class="col" >
                <div class="row-cols-1 mt-5 mb-5 align-items-center">
                    <h1 th:text="${product.name}"></h1>
                </div>
                <div class="row-cols-1">
                        <h5 th:text="${product.longDescription}"></h5>
                </div>
            </div>
        </div>
    </div>
    <div class="container text-lg-end">
        <button type="button" class="btn btn-sm btn-outline-secondary me-3">
            <i class="fa-solid fa-cart-shopping"></i>
            Comprar
        </button>
        <button th:href="@{redirect:/productsList}" type="button" class="btn btn-sm btn-outline-secondary me-3">
            <i class="fa-solid fa-arrow-left"></i>
            Volver
        </button>
    </div>
    <div>
        <div class="row ">
            <div class="col" th:each="review : ${reviews}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0" th:text="${review.title}">Título</h5>
                            <span class="badge bg-warning text-dark">
                            <i class="fa-solid fa-star me-1"></i>
                            <span th:text="${review.rating + ' / 5'}"></span>
                        </div>
                        <p th:text="${review.comment}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
