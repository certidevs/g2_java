<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Producto')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="form-card">
        <h1 class="h3 mb-4">
            <i class="fa-solid fa-box text-primary me-2"></i>
            <span th:text="${product.id != null} ? 'Editar producto' : 'Nuevo producto'">Producto</span>
        </h1>

        <div class="card">
            <div class="card-body p-4">
                <form th:action="@{/products}" method="post" th:object="${product}" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" required>
                    </div>

                    <div class="mb-3">
                        <label for="shortDescription" class="form-label">Descripción corta</label>
                        <input type="text" class="form-control" id="shortDescription" th:field="*{shortDescription}">
                    </div>

                    <div class="mb-3">
                        <label for="longDescription" class="form-label">Descripción larga</label>
                        <textarea class="form-control" id="longDescription" th:field="*{longDescription}" rows="4"></textarea>
                    </div>

                    <div class="row g-3">
                        <div class="col-sm-6 mb-3">
                            <label for="price" class="form-label">Precio (€)</label>
                            <div class="input-group">
                                <input type="number" step="0.01" min="0" class="form-control" id="price" th:field="*{price}">
                                <span class="input-group-text">€</span>
                            </div>
                        </div>
                        <div class="col-sm-6 mb-3">
                            <label for="stock" class="form-label">Stock</label>
                            <input type="number" min="0" class="form-control" id="stock" th:field="*{stock}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="dishTypes" class="form-label">Categoría</label>
                        <select class="form-select" id="dishTypes" th:field="*{category.id}">
                            <option value="">— Sin categoría —</option>
                            <option th:each="cat : ${category}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="imageFile" class="form-label">Imagen</label>
                        <input type="hidden" th:field="*{image}">
                        <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*">
                        <img id="preview" alt="Previsualización" class="mt-3 rounded border"
                             style="max-height:160px; display:none"
                             th:src="${product != null and product.image != null ? product.image : null}">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                        </button>
                        <a th:href="@{/products}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script>
    (function () {
        const input = document.getElementById('imageFile');
        const preview = document.getElementById('preview');
        if (preview && preview.getAttribute('src')) {
            preview.style.display = 'block';
        }
        if (input) {
            input.addEventListener('change', function () {
                const file = this.files[0];
                if (file) {
                    preview.src = URL.createObjectURL(file);
                    preview.style.display = 'block';
                }
            });
        }
    })();
</script>
</body>
</html>
