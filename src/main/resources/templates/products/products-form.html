<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Five Chill GYM')}"></head>
<body class="d-flex flex-column min-vh-100">
<link rel="stylesheet" th:href="@{/css/products.css}">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="mb-4">Crear Producto</h1>
            <form th:action="@{/products}" method="post" th:object="${product}">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label for="name" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}">
                </div>

                <div class="mb-3">
                    <label for="shortDescription" class="form-label">Descripción Corta</label>
                    <input type="text" class="form-control" id="shortDescription" th:field="*{shortDescription}">
                </div>

                <div class="mb-3">
                    <label for="longDescription" class="form-label">Descripción Larga</label>
                    <textarea class="form-control" id="longDescription" th:field="*{longDescription}" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">Precio</label>
                    <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}">
                </div>
                <div class="mb-3">
                    <label for="image" class="form-label">URL imagen</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="image" th:field="*{image}" disabled>
                        <div class="input-group-text">
                            <input class="form-check-input mt-0" type="checkbox" id="editImageToggle"
                                   aria-label="Permitir edición de imagen">
                        </div>
                    </div>
                    <small class="form-text text-muted">Marca para editar la URL</small>
                </div>

                <script>
                    document.getElementById('editImageToggle').addEventListener('change', function() {
                        const imageInput = document.getElementById('image');
                        imageInput.disabled = !this.checked;
                        if (this.checked) {
                            imageInput.focus();
                        }
                    });
                </script>

                <button type="submit" class="btn btn-success">
                    <i class="fa-solid fa-floppy-disk"></i> Guardar
                </button>

                <a th:href="@{/products}" class="btn btn-secondary">Cancelar</a>


            </form>
        </div>
    </div>
</main>

</body>
</html>
