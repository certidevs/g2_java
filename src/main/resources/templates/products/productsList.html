<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Five Chill GYM')}"></head>
<body class="d-flex flex-column min-vh-100">
<link rel="stylesheet" th:href="@{/css/products.css}">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1 ">
    <section class="py-5  text-center container" style="background-color: rgb(0 0 0 / 0.84); background-size: cover; background-repeat: no-repeat; background-position: center; min-height: 100vh; margin: 0; padding: 0;position: relative ;z-index: 2">
        <div class="row" style="background-image: url('https://imgs.search.brave.com/6jDsIZ8vmCbLG2ndt4FDR9VykWQN00SB_XJilnaPfMo/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9zYXJk/ZW55YS5mb3J1cy5l/cy9odWJmcy9jZW50/cm9zL2JhcmNlbG9u/YV9zYXJkZW55YS82/LWZvcnVzX2JhcmNl/bG9uYV9zYXJkZW55/YS5qcGc'); background-size: cover; background-repeat: no-repeat; background-position: center; border-image-source: linear-gradient(rgb(0 0 0 / 0.84)); border-image-slice: fill 1; min-height: 100vh; margin: 0; padding: 0;">
            <div class="col-lg-6 col-md-8 mx-auto align-self-center">
                <h1 class="fw-light text-white">Productos</h1>
                <p class="lead text-white">Aquí podrás ver nuestros mejores productos para musculación y equipamiento deportivo para todos los casos, Con las mejores ofertas y marcas variadas (nike®, addidas®, Under Armour®, Jordan®, etc)</p>
                <p> <a th:href="@{reviews-productos}" class="btn btn-primary my-2">Opiniones sobre nuestros productos</a>
                </p>
            </div>
        </div>
    </section>
    <div class="album py-5 bg-body-tertiary">
        <div class="container">
            <div class="row">
                <div class="col-0">
                    <a th:href="@{/filter-mintomax}" class="btn btn-sm btn-outline-info column">
                        <i class="fa-solid fa-arrow-up"></i>
                    </a>
                    <a th:href="@{/filter-maxtomin}" class="btn btn-sm btn-outline-info">
                        <i class="fa-solid fa-arrow-down"></i>
                    </a>
                </div>
                <form th:action="@{/products}" method="get" class="col">
                    <label class="form-label form-label-sm">Buscar:</label>
                    <input type="text" name="name" class=" form-control-sm col-3"
                           placeholder="Busca por título..." th:value="${param.name}">
                    <button type="submit" class="btn btn-primary btn-sm"><i class="fa-solid fa-magnifying-glass"></i>Buscar</button>
                    <a th:href="@{products/create}" class="btn btn-secondary btn-sm col-1 visually-hidden">
                        <i class="fa-solid fa-plus"></i>
                    </a>
                </form>
            </div>
            <div  class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
                <div id="sombra" th:each="product : ${products}" class="col mt-4 mb-4">
                    <div>
                        <a th:href="@{/products/{id}(id=${product.id})}">
                            <img th:src="${product.image}" class="card-img-top"  alt="..." role="img" width="400" height="500">
                        </a>
                        <div class="card-body" >
                            <a th:href="@{/products/{id}(id=${product.id})}">
                                <h5 class="card-title" th:text="${product.name}">Titulo</h5>
                                <p class="card-text" th:text="${product.shortDescription}">Descripcion</p>
                            </a>
                            <div class="d-flex justify-content-between align-items-center">
                                <h2 class="align-items-start card-title" th:text="${product.price} + '€'">€</h2>
                                <div class="btn-group">
                                    <a th:href="@{/products/{id}(id=${product.id})}" style="text-decoration: none; color: inherit;">
                                        <button th:href="@{/products}" type="button" class="btn btn-sm btn-outline-secondary">View</button>
                                    </a>
<!--                                    <a th:href="@{/purchase-lines}">-->
<!--                                        <button type="button" class="btn btn-sm btn-outline-secondary">-->
<!--                                            <i class="fa-solid fa-cart-shopping"></i>-->
<!--                                        </button>-->
<!--                                    </a>-->
                                    <form th:action="@{/purchase-lines/create}" method="post">
                                        <input type="hidden"
                                               name="productId"
                                               th:value="${product.id}">
                                        <button type="submit"
                                                class="btn btn-sm btn-outline-secondary">
                                            <i class="fa-solid fa-cart-shopping"></i>
                                        </button>
                                    </form>
                                    <a th:href="@{/products/deactivate/{id}(id=${product.id})}" class="btn btn-sm btn-warning visually-hidden">
                                        <i class="fa-solid fa-cart-shopping"></i>
                                    </a>
                                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-secondary visually-hidden">
                                        <i class="fa-solid fa-pencil me-1"></i>

                                    </a>
                                </div>
                            </div>
                            <small th:if="${product.stock != 0}" class="text-body-secondary align-items-start">Disponibe</small>
                            <small th:unless="${product.stock != 0}" class="text-body-secondary align-items-start">No Disponibe</small>
                        </div>
                    </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
