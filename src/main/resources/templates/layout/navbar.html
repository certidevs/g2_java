<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-white mb-4 p-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/products}">
            <img th:src="@{/images/fivechillingA.png}" alt="Five chill guys GYM"
                 height="64" class="me-2 rounded-3">
<!--            <span>Restaurantes</span>-->
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse pt-sm-4" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">
                        <i class="fa-solid fa-store me-1"></i> Productos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categories}">
                        <i class="fa-solid fa-layer-group"></i> Categorias
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reviews-productos}">
                        <i class="fa-regular fa-comment"></i> Opiniones
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/purchase-lines}">
                        <i class="fa-solid fa-cart-shopping"></i>
                        Carrito
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">
                        <i class="fa-solid fa-users me-1"></i> Usuarios
                    </a>

                </li>

            </ul>
            <div sec:authorize="!isAuthenticated()">
                <a class="btn btn-outline-secondary ms-2" th:href="@{/login}">
                    <i class="fa-solid fa-right-to-bracket"></i> Acceso Socio
                </a>
                <a class="btn btn-outline-secondary ms-2" th:href="@{/register}">
                    <i class="fa-solid fa-user-plus"></i> Registrarse
                </a>
            </div>
            <div sec:authorize="isAuthenticated()">
                <a class="btn btn-secondary ms-2" style="outline: none" th:href="@{/profile}">
                <span class="text-secondary me-3">
                    <i class="fa-solid fa-user me-1"></i>
                    Bienvenido <span sec:authentication="name"></span>
                </span>
                </a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button class="btn btn-outline-secondary btn-sm ms-2">
                        <i class="fa-solid fa-sign-out"></i> Salir
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
