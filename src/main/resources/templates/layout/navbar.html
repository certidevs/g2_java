<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="app-navbar navbar navbar-expand-lg sticky-top mb-4 py-2 shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/products}">
            <img th:src="@{/images/fivechillingA.png}" alt="Five Chill Guys Gym"
                 height="48" class="rounded-3">
            <span class="fw-bold d-none d-sm-inline">Five Chill Guys <span class="text-primary">Gym</span></span>
        </a>
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">
                        <i class="fa-solid fa-store me-1"></i> Productos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categories}">
                        <i class="fa-solid fa-layer-group me-1"></i> Categorías
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reviews-productos}">
                        <i class="fa-regular fa-comment me-1"></i> Opiniones
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/purchase-lines}">
                        <i class="fa-solid fa-cart-shopping me-1"></i> Carrito
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">
                        <i class="fa-solid fa-users me-1"></i> Usuarios
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-2" sec:authorize="!isAuthenticated()">
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/login}">
                    <i class="fa-solid fa-right-to-bracket me-1"></i> Acceso
                </a>
                <a class="btn btn-primary btn-sm" th:href="@{/register}">
                    <i class="fa-solid fa-user-plus me-1"></i> Registrarse
                </a>
            </div>

            <div sec:authorize="isAuthenticated()" class="dropdown">
                <a role="button" data-bs-toggle="dropdown" aria-expanded="false"
                   class="d-flex align-items-center gap-2 text-decoration-none link-dark">
                    <span th:if="${#authentication.principal != null and #authentication.principal.imageUrl != null}">
                        <img th:src="${#authentication.principal.imageUrl}"
                             alt="avatar" width="36" height="36"
                             class="rounded-circle object-fit-cover border border-2 border-light shadow-sm">
                    </span>
                    <span th:unless="${#authentication.principal != null and #authentication.principal.imageUrl != null}"
                          class="icon-circle" style="width:36px;height:36px;">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <span class="d-none d-sm-inline fw-semibold"
                          th:text="${#authentication.principal.username}">Usuario</span>
                    <i class="fa-solid fa-chevron-down small text-muted"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                    <li><a class="dropdown-item" th:href="@{/profile}"><i class="fa-solid fa-user me-2 text-muted"></i> Mi perfil</a></li>
                    <li><a class="dropdown-item" th:href="@{/purchases}"><i class="fa-solid fa-cart-shopping me-1"></i> Mis pedidos</a></li>
                    <li><a class="dropdown-item" th:href="@{/products}"><i class="fa-solid fa-house me-2 text-muted"></i> Inicio</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" th:href="@{/admin/users}"><i class="fa-solid fa-users me-2 text-muted"></i> Panel usuarios</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button class="dropdown-item text-danger"><i class="fa-solid fa-right-from-bracket me-2"></i> Salir</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <!-- Bootstrap bundle loaded once here so every page with a navbar has JS -->
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</nav>
</body>
</html>
