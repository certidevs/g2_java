<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-white mb-4 p-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/products}">
            <img th:src="@{/images/fivechillingA.png}" alt="Five chill guys GYM"
                 height="64" class="me-2 rounded-3">
<!--            <span>Restaurantes</span>-->
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse pt-sm-4" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">
                        <i class="fa-solid fa-store me-1"></i> Productos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categories}">
                        <i class="fa-solid fa-layer-group"></i> Categorias
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reviews-productos}">
                        <i class="fa-regular fa-comment"></i> Opiniones
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/purchase-lines}">
                        <i class="fa-solid fa-cart-shopping"></i>
                        Carrito
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">
                        <i class="fa-solid fa-users me-1"></i> Panel Usuarios
                    </a>

                </li>

            </ul>
            <div sec:authorize="!isAuthenticated()">
                <a class="btn btn-outline-secondary ms-2" th:href="@{/login}">
                    <i class="fa-solid fa-right-to-bracket"></i> Acceso Socio
                </a>
                <a class="btn btn-outline-secondary ms-2" th:href="@{/register}">
                    <i class="fa-solid fa-user-plus"></i> Registrarse
                </a>
            </div>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
            <div sec:authorize="isAuthenticated()" class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <span th:unless="${#authentication.principal != null and #authentication.principal.imageUrl != null}" class="rounded-circle d-inline-flex justify-content-center align-items-center overflow-hidden" style="width: 16px; height: 16px;">
                        <i
                       class="fa-solid fa-user"
                       style="font-size: 16px; color: orange; background: grey; background-size: cover"></i>
                    </span>
                    <img th:if="${#authentication.principal != null and #authentication.principal.imageUrl != null}" th:src="${#authentication.principal.imageUrl != null ? #authentication.principal.imageUrl : '/images/avatar.svg'}"
                            alt="avatar" width="16" height="16"
                            class="rounded-circle object-fit-cover me-2 border border-2 border-light bg-white">Bienvenido <span sec:authentication="name"></span>
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" th:href="@{/profile}">Perfil <i class="fa-solid fa-user"></i></a></li>
                    <li><a class="dropdown-item" th:href="@{/products}">Inicio <i class="fa-solid fa-home"></i></a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" th:href="@{/admin/users}">Panel Usuarios<i class="fa-solid fa-users ms-2"></i></i></a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><form th:action="@{/logout}" method="post" class="align-items-start">
                        <button class="dropdown-item ">
                            Salir <i class="fa-solid fa-sign-out"></i>
                        </button>
                    </form></li>

                </ul>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
