<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<footer th:fragment="footer" class="site-footer mt-5 pt-5 pb-4">
    <div class="container">
        <div class="row gy-4">
            <div class="col-lg-5">
                <h5 class="text-white d-flex align-items-center gap-2 mb-2">
                    <i class="fa-solid fa-dumbbell text-primary"></i> Five Chill Guys <span class="text-primary">Gym</span>
                </h5>
                <p class="small mb-0">
                    Suplementos, ropa y equipamiento deportivo para sacar tu mejor versión.
                    Las mejores marcas con las mejores ofertas.
                </p>
            </div>
            <div class="col-6 col-lg-3">
                <h6 class="text-white-50 text-uppercase small mb-3">Tienda</h6>
                <ul class="list-unstyled small mb-0 d-grid gap-2">
                    <li><a th:href="@{/products}">Productos</a></li>
                    <li><a th:href="@{/categories}">Categorías</a></li>
                    <li><a th:href="@{/reviews-productos}">Opiniones</a></li>
                </ul>
            </div>
            <div class="col-6 col-lg-4">
                <h6 class="text-white-50 text-uppercase small mb-3">Síguenos</h6>
                <div class="d-flex gap-3 fs-5">
                    <a href="#" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
                    <a href="#" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" aria-label="Contacto"><i class="fa-regular fa-envelope"></i></a>
                </div>
            </div>
        </div>
        <hr class="border-secondary my-4">
        <p class="text-center small mb-0">
            <i class="fa-regular fa-copyright"></i> 2026 Five Chill Guys Gym — Adecco
        </p>
    </div>
</footer>

<!-- Bootstrap JS is loaded once via the navbar fragment; this stays as a
     no-op so existing th:replace references keep working without double-loading. -->
<th:block th:fragment="scripts"></th:block>
</body>
</html>
