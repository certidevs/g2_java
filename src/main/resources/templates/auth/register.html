<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Crear cuenta')}"></head>
<body>
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="card auth-card">
                    <div class="card-body p-4 p-sm-5">
                        <div class="text-center mb-4">
                            <a th:href="@{/products}">
                                <img th:src="@{/images/fivechillingA.png}" alt="Five Chill Guys Gym" class="rounded-3 mb-3" style="height:72px;">
                            </a>
                            <h1 class="h4 mb-1">Crea tu cuenta</h1>
                            <p class="text-muted small mb-0">Únete y disfruta de las mejores ofertas.</p>
                        </div>

                        <div th:if="${error}" class="alert alert-danger py-2"><i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${error}"></span></div>

                        <form th:action="@{/register}" method="post" th:object="${user}">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="username" placeholder="pepe666"
                                       required th:field="*{username}" min="3" maxlength="100" autofocus>
                                <label for="username"><i class="fa-solid fa-user me-1"></i> Username</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="email" placeholder="pepe@gmail.com" required th:field="*{email}">
                                <label for="email"><i class="fa-solid fa-envelope me-1"></i> Email</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" th:field="*{password}" class="form-control" id="password" placeholder="Contraseña" required minlength="4">
                                <label for="password"><i class="fa-solid fa-lock me-1"></i> Contraseña</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" th:field="*{passwordConfirm}" class="form-control" id="passwordConfirm" placeholder="Repite la contraseña" required minlength="4">
                                <label for="passwordConfirm"><i class="fa-solid fa-lock me-1"></i> Repite la contraseña</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg">
                                <i class="fa-solid fa-user-plus me-1"></i> Crear cuenta
                            </button>
                        </form>

                        <hr class="my-4">
                        <p class="text-center small text-muted mb-2">¿Ya tienes cuenta?</p>
                        <a th:href="@{/login}" class="btn btn-outline-secondary w-100">
                            <i class="fa-solid fa-right-to-bracket me-1"></i> Inicia sesión
                        </a>
                        <div class="text-center mt-3">
                            <a th:href="@{/products}" class="small text-muted text-decoration-none">
                                <i class="fa-solid fa-arrow-left me-1"></i> Volver a la tienda
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
