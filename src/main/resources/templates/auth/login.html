<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Iniciar sesión')}"></head>
<body>
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="card auth-card">
                    <div class="card-body p-4 p-sm-5">
                        <div class="text-center mb-4">
                            <a th:href="@{/products}">
                                <img th:src="@{/images/fivechillingA.png}" alt="Five Chill Guys Gym" class="rounded-3 mb-3" style="height:72px;">
                            </a>
                            <h1 class="h4 mb-1">¡Bienvenido de nuevo!</h1>
                            <p class="text-muted small mb-0">Accede a tu cuenta para seguir entrenando.</p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger py-2"><i class="fa-solid fa-circle-exclamation me-1"></i> Credenciales incorrectas.</div>
                        <div th:if="${param.logout}" class="alert alert-success py-2"><i class="fa-solid fa-circle-check me-1"></i> Has cerrado sesión.</div>
                        <div th:if="${message}" class="alert alert-success py-2" th:text="${message}"></div>

                        <form th:action="@{/login}" method="post">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="username" name="username"
                                       placeholder="pepe666" required autofocus min="3" maxlength="100">
                                <label for="username"><i class="fa-solid fa-user me-1"></i> Username</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" name="password" class="form-control" id="password" placeholder="Contraseña" required minlength="4">
                                <label for="password"><i class="fa-solid fa-lock me-1"></i> Contraseña</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg mb-2">
                                <i class="fa-solid fa-right-to-bracket me-1"></i> Entrar
                            </button>
                        </form>

                        <hr class="my-4">
                        <p class="text-center small text-muted mb-2">¿No tienes cuenta?</p>
                        <a th:href="@{/register}" class="btn btn-outline-secondary w-100">
                            <i class="fa-solid fa-user-plus me-1"></i> Crear una cuenta
                        </a>
                        <div class="text-center mt-3">
                            <a th:href="@{/products}" class="small text-muted text-decoration-none">
                                <i class="fa-solid fa-arrow-left me-1"></i> Volver a la tienda
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
