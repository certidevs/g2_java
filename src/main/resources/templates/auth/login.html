<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Iniciar sesión')}"></head>
<body class="d-flex align-items-center py-4 bg-secondary min-vh-100">

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <form th:action="@{/login}" method="post" class="card shadow-sm p-4">

                <div class="text-center mb-3">
                    <img th:src="@{/images/img.png}" alt="Logo" class="mb-2 rounded-3" style="width:150px;">
                    <h1 class="h3 mt-3 fw-normal">¡Bienvenido a tu gimnasio!</h1>
                </div>

                <div th:if="${param.error}" class="alert alert-danger">Credenciales incorrectas.</div>
                <div th:if="${param.logout}" class="alert alert-success">Sesión cerrada correctamente, hasta pronto.</div>
                <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>


                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="pepe666" required autofocus min="3" maxlength="100">
                    <label for="username">Username</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" name="password"
                           class="form-control" id="password"
                           required minlength="4">
                    <label for="password">Contraseña</label>
                </div>
                <div class="col d-sm-flex justify-content-center">
                <button type="submit" class="btn btn-success w-50 row me-3 rounded-3 align-self-center">Entrar</button>
                <a th:href="@{/products}" class="btn btn-secondary w-50 row me-2 rounded-3 align-self-center">Volver</a>
                </div>
                <p class="mt-3 text-center small">¿No tienes cuenta?
                </p>
                <a th:href="@{/register}" class="btn btn-info w-50 row me-3 rounded-3 align-self-center">
                    <i class="fa-solid fa-sign-in me-3"></i>>Crear cuenta</a>.
            </form>
        </div>
    </div>
</main>

<script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
