<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Five Chill GYM')}"></head>
<body class="d-flex flex-column min-vh-100">
<link rel="stylesheet" th:href="@{/css/products.css}">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="container text-center">
        <div class="row">
            <div class="col" >
                <div class="row-cols-1 mt-5 mb-5 align-items-center">
                    <h1 th:text="${category.name}"></h1>
                </div>
                <div class="row-cols-1">
                    <h5 th:text="${category.description}"></h5>
                </div>
                <div class="row mt-5">
                    <div class="row row-cols-1 row-cols-md-3 g-4" th:if="${products != null and products.size() > 0}">
                        <div class="col" th:each="product : ${products}">
                            <div class="card h-100">
                                <img th:src="@{${product.image}}" class="card-img-top" alt="Product Image">
                                <div class="card-body">
                                    <h5 class="card-title" th:text="${product.name}"></h5>
                                    <p class="card-text" th:text="${product.description}"></p>
                                    <p class="card-text">
                                        <strong th:text="${'$' + product.price}"></strong>
                                    </p>
                                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-primary">Ver Detalles</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:if="${products == null or products.size() == 0}" class="alert alert-info w-100">
                        <p>No hay productos en esta categoría.</p>
                    </div>
                </div>
            </div>



        </div>
    </div>
</main>

</body>
</html>
