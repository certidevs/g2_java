<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Five Chill GYM')}"></head>
<body class="d-flex flex-column min-vh-100">
<link rel="stylesheet" th:href="@{/css/products.css}">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="container text-center">
        <div class="row">
            <div class="col" >
                <div class="row-cols-1 mt-5 mb-5 align-items-center">
                    <h1 th:text="${category.name}"></h1>
                </div>
                <div class="row-cols-1">
                    <h5 th:text="${category.description}"></h5>
                </div>
            </div>
        </div>
    </div>

</main>

</body>
</html>
