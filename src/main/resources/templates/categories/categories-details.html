<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Categoría')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/categories}">Categorías</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${category.name}">Categoría</li>
        </ol>
    </nav>

    <!-- Category header -->
    <div class="card mb-5">
        <div class="card-body d-flex flex-column flex-md-row align-items-center gap-4 p-4">
            <img th:src="${category.imageFile}" alt="Categoría"
                 class="rounded-circle border object-fit-cover flex-shrink-0"
                 width="120" height="120">
            <div class="text-center text-md-start">
                <h1 class="h3 mb-2" th:text="${category.name}">Nombre</h1>
                <p class="text-muted mb-2" th:text="${category.description}">Descripción</p>
                <span th:if="${category.activo}" class="badge text-bg-success">Activada</span>
                <span th:unless="${category.activo}" class="badge text-bg-danger">Desactivada</span>
            </div>
        </div>
    </div>

    <h2 class="section-title h4 mb-4">Productos de esta categoría</h2>

    <div th:if="${products == null or products.size() == 0}" class="empty-state text-center py-5 mb-5">
        <i class="fa-solid fa-box-open fa-2x text-muted mb-3 d-block"></i>
        <p class="text-muted mb-0">No hay productos en esta categoría.</p>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4 mb-5"
         th:if="${products != null and products.size() > 0}">
        <div class="col" th:each="product : ${products}">
            <div class="card product-card hover-lift">
                <a th:href="@{/products/{id}(id=${product.id})}">
                    <img th:src="${product.image}" class="product-thumb" alt="Producto">
                </a>
                <div class="card-body d-flex flex-column">
                    <a th:href="@{/products/{id}(id=${product.id})}" class="link-dark">
                        <h5 class="card-title mb-1" th:text="${product.name}">Producto</h5>
                    </a>
                    <p class="card-text text-muted small line-clamp-2 mb-3" th:text="${product.shortDescription}">Descripción</p>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <span class="product-price fs-5" th:text="${product.price} + ' €'">€</span>
                        <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-sm btn-primary">Ver</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
