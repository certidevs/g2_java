<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Categorías')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <div th:if="${message}" class="alert alert-success" role="alert">
        <i class="fa-solid fa-check-circle me-2"></i>
        <span th:text="${message}"></span>
    </div>
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">

        <h1 class="section-title h2 mb-0">Categorías</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/categories/new}" class="btn btn-success">
            <i class="fa-solid fa-plus me-1"></i> Nueva categoría
        </a>
    </div>

    <div th:if="${#lists.isEmpty(categories)}" class="empty-state text-center py-5">
        <i class="fa-solid fa-layer-group fa-2x text-muted mb-3 d-block"></i>
        <p class="text-muted mb-0">No hay categorías disponibles.</p>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4 mb-5">
        <div class="col" th:each="category : ${categories}">
            <div class="card h-100 text-center hover-lift">
                <div class="card-body d-flex flex-column align-items-center">
                    <img th:src="${category.imageFile}" alt="Categoría"
                         class="rounded-circle border object-fit-cover mb-3"
                         width="120" height="120">
                    <h2 class="h5 mb-2" th:text="${category.name}">Nombre</h2>
                    <p class="text-muted small line-clamp-2 mb-4" th:text="${category.description}">Descripción</p>

                    <div class="mt-auto d-flex flex-wrap justify-content-center gap-2">
                        <a th:href="@{/categories/{id}(id=${category.id})}" class="btn btn-sm btn-primary">
                            <i class="fa-solid fa-eye me-1"></i> Ver
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="fa-solid fa-pencil me-1"></i> Editar
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/categories/deactivate/{id}(id=${category.id})}"
                           class="btn btn-sm btn-outline-danger"
                           data-bs-toggle="modal"
                           data-bs-target="#userActionModal"
                           th:attr="data-url=@{/categories/deactivate/{id}(id=${category.id})}"
                           data-action="desactivar"
                           data-name="esta opinión">
                            <i class="fa-solid fa-trash me-1"></i> Desactivar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="userActionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar acción</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="modalMessage">¿Estás seguro?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <a id="confirmActionBtn" class="btn btn-danger" href="#">Confirmar</a>
                </div>
            </div>
        </div>
    </div>
</main>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script>
    const userActionModal = document.getElementById('userActionModal');

    let actionUrl = null;

    userActionModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;

        actionUrl = button.getAttribute('data-url');
        const action = button.getAttribute('data-action');
        // Capturamos el nuevo atributo data-name
        const entityName = button.getAttribute('data-name');
        const message = document.getElementById('modalMessage');
        const confirmBtn = document.getElementById('confirmActionBtn');
        // Usamos la variable entityName para que el mensaje sea natural
        message.textContent = `¿Seguro que quieres ${action} ${entityName}?`;
        confirmBtn.className =
            action === 'activar'
                ? 'btn btn-success'
                : 'btn btn-danger';
    });
    // CLICK DEL BOTÓN CONFIRMAR
    document.getElementById('confirmActionBtn').addEventListener('click', function () {
        if (actionUrl) {
            window.location.href = actionUrl;
        }
    });
</script>
</body>
</html>
