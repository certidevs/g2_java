<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Categoría')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="form-card">
        <h1 class="h3 mb-4">
            <i class="fa-solid fa-layer-group text-primary me-2"></i>
            <span th:text="${category.id != null} ? 'Editar categoría' : 'Nueva categoría'">Categoría</span>
        </h1>

        <div class="card">
            <div class="card-body p-4">
                <form th:action="@{/categories}" method="post" th:object="${category}">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Descripción</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                    </div>

                    <div class="mb-4">
                        <label for="image" class="form-label">Imagen (ruta o URL)</label>
                        <input type="text" class="form-control" id="image" th:field="*{image}"
                               placeholder="/images/categories/proteinas.png">
                        <img id="preview" alt="Previsualización" class="mt-3 rounded-circle border object-fit-cover"
                             width="100" height="100"
                             style="display:none" th:src="*{image}">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                        </button>
                        <a th:href="@{/categories}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script>
    (function () {
        const input = document.getElementById('image');
        const preview = document.getElementById('preview');
        function refresh() {
            if (input.value.trim()) { preview.src = input.value.trim(); preview.style.display = 'inline-block'; }
            else { preview.style.display = 'none'; }
        }
        refresh();
        input.addEventListener('input', refresh);
    })();
</script>
</body>
</html>
