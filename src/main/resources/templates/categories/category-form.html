<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Five Chill GYM')}"></head>
<body class="d-flex flex-column min-vh-100">
<link rel="stylesheet" th:href="@{/css/products.css}">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="mb-4">Crear/Editar Categorías</h1>
            <form th:action="@{/categories}" method="post" th:object="${category}">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label for="name" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}">
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Descripción</label>
                    <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Guardar</button>
                <a th:href="@{/categories/{id}(id=category.id)}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
<!-- TODO formulario de category -->
<!-- /categories/new -->
<!-- /categories/edit/{id} -->
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
