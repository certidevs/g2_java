<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Usuarios')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <div th:if="${message}" class="alert alert-success d-flex align-items-center gap-2">
        <i class="fa-solid fa-circle-check"></i> <span th:text="${message}"></span>
    </div>
    <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="section-title h2 mb-0">Usuarios</h1>

            <a th:href="@{/admin/users/new}" class="btn btn-success">
                <i class="fa-solid fa-user-plus me-1"></i> Crear usuario
            </a>
        </div>

        <div class="card w-100">
            <div class="card-body">

                <form th:action="@{/admin/users}" method="get"
                      class="row g-2 align-items-center">

                    <div class="col-12 col-md">
                        <div class="input-group">

                        <span class="input-group-text bg-white border-end-0">
                            <i class="fa-solid fa-magnifying-glass text-muted"></i>
                        </span>

                            <input type="text"
                                   name="username"
                                   class="form-control border-start-0 ps-0"
                                   placeholder="Busca un Usuario por nombre..."
                                   th:value="${param.name}">

                            <button type="submit" class="btn btn-primary px-4">
                                Buscar
                            </button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>


    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">#</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th class="text-end pe-4">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td class="ps-4 text-muted" th:text="${user.id}"></td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <span class="icon-circle" style="width:36px;height:36px;">
                                <img th:if="${user.imageUrl != null}" th:src="${user.imageUrl}" alt=""
                                     class="rounded-circle object-fit-cover" style="width:36px;height:36px;">
                                <i th:unless="${user.imageUrl != null}" class="fa-solid fa-user"></i>
                            </span>
                            <span class="fw-semibold" th:text="${user.username}"></span>
                        </div>
                    </td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span class="badge text-bg-light border" th:text="${user.role}"></span>
                    </td>
                    <td>
                        <span class="badge text-bg-success" th:if="${user.online}">Activo</span>
                        <span class="badge text-bg-secondary" th:unless="${user.online}">Inactivo</span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="btn-group">
                            <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary"
                               title="Ver">
                                <i class="fa-solid fa-eye"></i>
                            </a>
                            <a th:href="@{/admin/users/edit/{id}(id=${user.id})}"
                               class="btn btn-sm btn-outline-secondary" title="Editar">
                                <i class="fa-solid fa-user-pen"></i>
                            </a>

                            <!-- DESACTIVAR -->
                            <a th:if="${user.online}"
                               href="#"
                               class="btn btn-sm btn-outline-danger d-flex align-items-center gap-1"
                               data-bs-toggle="modal"
                               data-bs-target="#userActionModal"
                               th:attr="data-url=@{/admin/users/deactivate/{id}(id=${user.id})}"
                               data-action="desactivar"
                               data-name="este usuario">

                                <i class="fa-solid fa-user-slash"></i>
                                <span class="d-none d-md-inline">Desactivar</span>
                            </a>

                            <!-- ACTIVAR -->
                            <a th:unless="${user.online}"
                               href="#"
                               class="btn btn-sm btn-outline-success d-flex align-items-center gap-1"
                               data-bs-toggle="modal"
                               data-bs-target="#userActionModal"
                               th:attr="data-url=@{/admin/users/activate/{id}(id=${user.id})}"
                               data-action="activar"
                               data-name="este usuario">

                                <i class="fa-solid fa-user-check"></i>
                                <span class="d-none d-md-inline">Activar</span>
                            </a>


                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>

<div class="modal fade" id="userActionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Confirmar acción</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p id="modalMessage">¿Estás seguro?</p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>

                <a id="confirmActionBtn" class="btn btn-primary" href="#">
                    Confirmar
                </a>
            </div>

        </div>
    </div>
</div>
<script>
    const userActionModal = document.getElementById('userActionModal');

    let actionUrl = null;

    userActionModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;

        actionUrl = button.getAttribute('data-url');
        const action = button.getAttribute('data-action');

        const message = document.getElementById('modalMessage');
        const confirmBtn = document.getElementById('confirmActionBtn');

        message.textContent = `¿Seguro que quieres ${action} este usuario?`;

        confirmBtn.className =
            action === 'activar'
                ? 'btn btn-success'
                : 'btn btn-danger';
    });

    // CLICK DEL BOTÓN CONFIRMAR
    document.getElementById('confirmActionBtn').addEventListener('click', function () {
        if (actionUrl) {
            window.location.href = actionUrl;
        }
    });
</script></body>

</html>
