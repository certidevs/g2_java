<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Usuarios')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
        <h1 class="section-title h2 mb-0">Usuarios</h1>
        <a th:href="@{/admin/users/new}" class="btn btn-success">
            <i class="fa-solid fa-user-plus me-1"></i> Crear usuario
        </a>
    </div>

    <div th:if="${message}" class="alert alert-success d-flex align-items-center gap-2">
        <i class="fa-solid fa-circle-check"></i> <span th:text="${message}"></span>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">#</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th class="text-end pe-4">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td class="ps-4 text-muted" th:text="${user.id}"></td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <span class="icon-circle" style="width:36px;height:36px;">
                                <img th:if="${user.imageUrl != null}" th:src="${user.imageUrl}" alt=""
                                     class="rounded-circle object-fit-cover" style="width:36px;height:36px;">
                                <i th:unless="${user.imageUrl != null}" class="fa-solid fa-user"></i>
                            </span>
                            <span class="fw-semibold" th:text="${user.username}"></span>
                        </div>
                    </td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span class="badge text-bg-light border" th:text="${user.role}"></span>
                    </td>
                    <td>
                        <span class="badge text-bg-success" th:if="${user.online}">Activo</span>
                        <span class="badge text-bg-secondary" th:unless="${user.online}">Inactivo</span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="btn-group">
                            <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary" title="Ver">
                                <i class="fa-solid fa-eye"></i>
                            </a>
                            <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-outline-secondary" title="Editar">
                                <i class="fa-solid fa-user-pen"></i>
                            </a>
                            <a th:href="@{/admin/users/deactivate/{id}(id=${user.id})}" class="btn btn-sm btn-outline-danger" title="Desactivar"
                               onclick="return confirm('¿Desactivar este usuario?')">
                                <i class="fa-solid fa-user-slash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
