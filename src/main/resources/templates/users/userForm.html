<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Formulario usuario')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1 my-4">

    <h1 class="mb-0">
        <i class="fa-solid fa-user text-primary me-2"></i>
        <span th:text="${edit} ? 'Editar usuario' : 'Crear usuario'"></span>
    </h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/admin/users}" th:object="${user}" method="post">

        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username"
                   placeholder="pepe666" required th:field="*{username}" min="3" maxlength="100" autofocus>

        </div>
        <div class="mb-3">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email"
                   placeholder="pepe@gmail.com" required th:field="*{email}">

        </div>
        <div class="mb-3">
            <label for="password">Contraseña</label>
            <input type="password" th:field="*{password}"
                   class="form-control" id="password"
                   required minlength="4">
        </div>

        <div class="mb-3">
            <label class="form-label">Rol</label>

            <select class="form-select" th:field="*{role}" required>
                <option th:each="r : ${roles}"
                        th:value="${r}"
                        th:text="${r}">
                </option>
            </select>
        </div>

        <div class="form-check form-switch mb-3">
            <label class="form-check-label" for="online">Activo</label>
            <input class="form-check-input" type="checkbox" id="online" th:field="*{online}">
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-floppy-disk me-1"></i>
            Guardar
        </button>

        <a th:href="@{/admin/users}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
