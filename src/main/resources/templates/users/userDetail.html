<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/head :: head('Detalle Usuario')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">

    <h1 class="mb-3">
        <i class="fa-solid fa-user text-primary me-2"></i>
        <span th:text="${'Usuario: ' + user.id}"></span>
    </h1>

    <div class="card shadow-sm mb-4">

        <div class="card-body">
            <div class="text-center mb-3">
                <img th:if="${user.imageUrl != null}" th:src="${user.imageUrl}"
                     class="rounded-circle object-fit-cover"
                     width="150" height="150" alt="Foto perfil">
            </div>
            <dl class="row mb-0">
                <dt class="col-sm-3">ID</dt>
                <dd class="col-sm-9" th:text="${user.id}"></dd>
                <dt class="col-sm-3">Username</dt>
                <dd class="col-sm-9" th:text="${user.username}"></dd>
                <dt class="col-sm-3">Email</dt>
                <dd class="col-sm-9" th:text="${user.email}"></dd>
                <dt class="col-sm-3">Rol</dt>
                <dd class="col-sm-9" th:text="${user.role}"></dd>
            </dl>
        </div>
        <div class="card-footer text-end">
            <a th:href="@{/admin/users}" class="btn btn-sm btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver
            </a>
            <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-outline-success">
                <i class="fa-solid fa-user-pen me-1"></i> Editar
            </a>
            <a th:href="@{/admin/users/deactivate/{id}(id=${user.id})}" class="btn btn-sm btn-outline-danger">
                <i class="fa-solid fa-trash me-1"></i> Desactivar
            </a>
        </div>

    </div>

    <!-- TODO User STATS: count reviews, count orders, totalMoneySpent -->
    <!-- TODO reviews findByUser_Id -->
    <!-- TODO orders findByUser_Id -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <i class="fa-solid fa-star text-warning"></i>
                    <h3 class="card-title my-2" th:text="${userStats.countReviews()}"></h3>
                    <!-- se puede mostrar tambien la nota media de sus reseñas AVG(r.rating) -->
                    <p class="card-text text-muted">Reseñas escritas</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <i class="fa-solid fa-ticket text-primary"></i>
                    <!--    <h3 class="card-title my-2" th:text="${userStats.countOrders()}"></h3> -->
                      <p class="card-text text-muted">Pedidos realizados</p>
                  </div>
              </div>
          </div>
          <div class="col-md-4">
              <div class="card text-center shadow-sm">
                  <div class="card-body">
                      <i class="fa-solid fa-euro text-primary"></i>
                      <h3 class="card-title my-2">
                <!--          <span th:text="${#numbers.formatDecimal(userStats.moneySpent(), 1, 2)}"></span> € -->
                    </h3>
                    <p class="card-text text-muted">Total gastado</p>
                </div>
            </div>
        </div>
    </div>



    <h2 class="mt-5">
        <i class="fa-regular fa-comments text-primary me-2"></i> Reviews de este usuario
    </h2>
    <div th:if="${userStats.reviews().isEmpty()}" class="alert alert-light border">
        <i class="fa-regular fa-face-smile me-1"></i>
        Este fenómeno no ha escrito nada todavía.
    </div>
    <div class="row row-cols-1 row-cols-md-2 g-3" th:unless="${userStats.reviews().isEmpty()}">
        <div class="col" th:each="review : ${userStats.reviews()}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${review.title}">Título</h5>
                    <p class="card-text" th:text="${review.comment}">Descripción</p>
                    <span class="badge bg-warning text-dark">
                        <i class="fa-solid fa-star me-1"></i>
                        <span th:text="${review.rating + ' / 5'}"></span>
                    </span>
                </div>
                <div class="card-footer text-muted small bg-transparent">
                    <i class="fa-regular fa-calendar me-1"></i>
                    <span th:text="${review.createdAt}"></span>
                </div>
            </div>
        </div>
    </div>


    <h2 class="mt-5">
        <i class="fa-solid fa-ticket text-primary me-2"></i> Pedidos de este usuario
    </h2>
<!--    <div th:if="${userStats.orders().isEmpty()}" class="alert alert-light border">-->
        <i class="fa-regular fa-face-smile me-1"></i>

<!--                        <dt class="col-sm-6">Mesa</dt>-->

<!--                        <dd class="col-sm-6" th:text="${order.totalPrice}"></dd>-->
<!--                    </dl>-->
<!--                </div>-->

<!--                    <i class="fa-regular fa-calendar me-1"></i>-->
<!--                    <span th:text="${order.date}"></span>-->
<!--                </div>-->
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
