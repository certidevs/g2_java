<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Editar perfil')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="form-card">
        <h1 class="h3 mb-4">
            <i class="fa-solid fa-user text-primary me-2"></i>
            <span th:text="${edit} ? 'Editar perfil' : 'Crear usuario'">Perfil</span>
        </h1>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card">
            <div class="card-body p-4">
                <form th:action="@{/profile}" th:object="${user}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{role}">
                    <input type="hidden" th:field="*{online}">

                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username"
                               placeholder="pepe666" required th:field="*{username}" min="3" maxlength="100" autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email"
                               placeholder="pepe@gmail.com" required th:field="*{email}">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" th:field="*{password}" class="form-control" id="password"
                               th:required="${!edit}" minlength="4"
                               th:placeholder="${edit} ? 'Déjalo en blanco para no cambiarla' : ''">
                    </div>

                    <div class="mb-3" sec:authorize="hasRole('ADMIN')">
                        <label class="form-label">Rol</label>
                        <select class="form-select" th:field="*{role}" required>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                    </div>

                    <div class="form-check form-switch mb-3" sec:authorize="hasRole('ADMIN')">
                        <input class="form-check-input" type="checkbox" id="online" th:field="*{online}">
                        <label class="form-check-label" for="online">Usuario activo</label>
                    </div>

                    <div class="mb-4">
                        <label for="imageFile" class="form-label">Foto de perfil</label>
                        <input type="hidden" th:field="*{imageUrl}">
                        <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*">
                        <img id="preview" alt="Previsualización" class="mt-3 rounded-circle border object-fit-cover"
                             width="110" height="110" style="display:none"
                             th:src="${user != null and user.imageUrl != null ? user.imageUrl : null}">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                        </button>
                        <a th:href="@{/profile}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script>
    (function () {
        const input = document.getElementById('imageFile');
        const preview = document.getElementById('preview');
        if (preview && preview.getAttribute('src')) preview.style.display = 'inline-block';
        if (input) input.addEventListener('change', function () {
            const file = this.files[0];
            if (file) { preview.src = URL.createObjectURL(file); preview.style.display = 'inline-block'; }
        });
    })();
</script>
</body>
</html>
