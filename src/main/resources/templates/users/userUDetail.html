<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Mi perfil')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <!-- Profile hero -->
    <div class="hero p-4 p-md-5 mb-4">
        <div class="row align-items-center g-4">
            <div class="col-auto">
                <div class="icon-circle bg-white shadow" style="width:120px;height:120px;font-size:3rem;">
                    <img th:if="${user.imageUrl}" th:src="${user.imageUrl}" alt="Avatar"
                         class="rounded-circle object-fit-cover" style="width:120px;height:120px;">
                    <i th:unless="${user.imageUrl}" class="fa-solid fa-user text-primary"></i>
                </div>
            </div>
            <div class="col">
                <h1 class="h2 mb-1" th:text="${user.username}">Usuario</h1>
                <p class="text-white-50 mb-3"><i class="fa-solid fa-envelope me-1"></i><span th:text="${user.email}"></span></p>
                <div class="d-flex flex-wrap gap-2">
                    <a th:href="@{/profile/edit/{id}(id=${user.id})}" class="btn btn-primary">
                        <i class="fa-solid fa-user-pen me-1"></i> Editar perfil
                    </a>
                    <a th:href="@{/products}" class="btn btn-outline-light">
                        <i class="fa-solid fa-store me-1"></i> Ir a la tienda
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div role="button" onclick="showSection('reviewsSection')" class="card text-center hover-lift h-100">
                <div class="card-body">
                    <i class="fa-solid fa-star text-warning fa-2x mb-2"></i>
                    <h3 class="mb-0" th:text="${userStats.countReviews()}">0</h3>
                    <p class="text-muted mb-0">Reseñas escritas</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div role="button" onclick="showSection('favoritesSection')" class="card text-center hover-lift h-100">
                <div class="card-body">
                    <i class="fa-solid fa-heart text-danger fa-2x mb-2"></i>
                    <h3 class="mb-0" th:text="${userStats.countFavorites()}">0</h3>
                    <p class="text-muted mb-0">Favoritos</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <a th:href="@{/purchases}" class="text-decoration-none">
                <div class="card text-center hover-lift h-100">
                    <div class="card-body">
                        <i class="fa-solid fa-ticket text-primary fa-2x mb-2"></i>
                        <h3 class="mb-0 text-dark" th:text="${userStats.countPurchase()}">0</h3>
                        <p class="text-muted mb-0">Compras realizadas</p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Reviews section -->
    <div id="reviewsSection" class="mb-4">
        <h2 class="section-title h4 mb-3"><i class="fa-regular fa-comments text-primary me-2"></i>Mis reseñas</h2>
        <div th:if="${userStats.reviews().isEmpty()}" class="empty-state text-muted p-4">
            <i class="fa-regular fa-face-smile me-1"></i> Todavía no has escrito ninguna reseña.
        </div>
        <div class="row row-cols-1 row-cols-md-2 g-3" th:unless="${userStats.reviews().isEmpty()}">
            <div class="col" th:each="review : ${userStats.reviews()}">
                <div class="card h-100 hover-lift">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0" th:text="${review.title}">Título</h5>
                            <span class="badge text-bg-warning text-dark">
                                <i class="fa-solid fa-star me-1"></i><span th:text="${review.rating} + ' / 5'"></span>
                            </span>
                        </div>
                        <p class="card-text text-muted" th:text="${review.comment}">Comentario</p>
                    </div>
                    <div class="card-footer bg-transparent text-muted small">
                        <i class="fa-regular fa-calendar me-1"></i>
                        <span th:text="${review.createdAt != null} ? ${#temporals.format(review.createdAt, 'dd/MM/yyyy')} : '—'"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Favorites section -->
    <div id="favoritesSection" class="d-none mb-5">
        <h2 class="section-title h4 mb-3"><i class="fa-solid fa-heart text-danger me-2"></i>Mis favoritos</h2>
        <div th:if="${userStats.favoriteProduct().isEmpty()}" class="empty-state text-muted p-4">
            <i class="fa-regular fa-heart me-1"></i> Aún no has marcado productos favoritos.
        </div>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3" th:unless="${userStats.favoriteProduct().isEmpty()}">
            <div class="col" th:each="fav : ${userStats.favoriteProduct()}">
                <div class="card h-100 hover-lift">
                    <div class="row g-0 h-100">
                        <div class="col-4">
                            <img th:src="${fav.product.image}" class="img-fluid h-100 w-100 object-fit-contain bg-light rounded-start p-2" alt="Producto">
                        </div>
                        <div class="col-8">
                            <div class="card-body">
                                <h5 class="card-title h6">
                                    <a th:href="@{/products/{id}(id=${fav.product.id})}" class="link-dark" th:text="${fav.product.name}">Producto</a>
                                </h5>
                                <p class="product-price fs-6 mb-1" th:text="${fav.product.price} + ' €'"></p>
                                <small class="text-muted">
                                    <i class="fa-regular fa-clock me-1"></i>
                                    <span th:text="${#temporals.format(fav.createdAt, 'dd/MM/yyyy')}"></span>
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script>
    function showSection(sectionId) {
        document.getElementById('reviewsSection').classList.add('d-none');
        document.getElementById('favoritesSection').classList.add('d-none');
        const target = document.getElementById(sectionId);
        if (target) {
            target.classList.remove('d-none');
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }
</script>
</body>
</html>
