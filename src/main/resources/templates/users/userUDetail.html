<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/head :: head('Detalle Usuario')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="flex-grow-1 my-4">


    <div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center rounded-3" style="background: linear-gradient(to bottom,#ffffff 25%, #ffffff 50%, grey 75%, grey 100%);">
        <div class="card shadow-lg" style="max-width: 1280px; width: 100%; max-height: 720px; height: 100%">
            <h1 class="mb-3 align-self-start card-header">
                <span>Perfil:</span>
            </h1>
            <div class="card-body">
                <div class="text-center mb-3">
                    <i class="fa-solid fa-user rounded-circle object-fit-cover mb-4" width="320" height="320" alt="Foto perfil"></i>
                </div>
                <dl class="row mb-0">
                    <dt class="col-sm-3">Username</dt>
                    <dd class="col-sm-9" th:text="${user.username}"></dd>

                    <dt class="col-sm-3 mt-5">Email</dt>
                    <dd class="col-sm-9 mt-5" th:text="${user.email}"></dd>
                </dl>
            </div>
            <div class="row g-2 mb-4">
                <div class="col-md-6">
                    <div class="card text-center shadow-sm">
                        <div class="card-body">
                            <i class="fa-solid fa-star text-warning"></i>
                            <h3 class="card-title my-2" th:text="${userStats.countReviews()}"></h3>
                            <!-- se puede mostrar tambien la nota media de sus reseñas AVG(r.rating) -->
                            <p class="card-text text-muted">Reseñas escritas</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card text-center shadow-sm">
                        <div class="card-body">
                            <i class="fa-solid fa-ticket text-primary"></i>
                            <h3 class="card-title my-2" th:text="${userStats.countPurchase()}"></h3>
                            <p class="card-text text-muted">Compras Realizadas</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer d-flex justify-content-center gap-2">
                <a th:href="@{/products}" class="btn btn-sm btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left me-1"></i> Volver
                </a>
                <a th:href="@{profile/edit/{id}(id=${user.id})}"
                   class="btn btn-sm btn-outline-success">
                    <i class="fa-solid fa-user-pen me-1"></i> Editar
                </a>
            </div>
        </div>

    </div>

    <h2 class="mt-5">
        <i class="fa-regular fa-comments text-primary me-2"></i> Reviews de este usuario
    </h2>
    <div th:if="${userStats.reviews().isEmpty()}" class="alert alert-light border">
        <i class="fa-regular fa-face-smile me-1"></i>
        No has hecho ningun comentario tadavia.
    </div>
    <div class="row row-cols-1 row-cols-md-2 g-3" th:unless="${userStats.reviews().isEmpty()}">
        <div class="col" th:each="review : ${userStats.reviews()}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${review.title}">Título</h5>
                    <p class="card-text" th:text="${review.comment}">Descripción</p>
                    <span class="badge bg-warning text-dark">
                        <i class="fa-solid fa-star me-1"></i>
                        <span th:text="${review.rating + ' / 5'}"></span>
                    </span>
                </div>
                <div class="card-footer text-muted small bg-transparent">
                    <i class="fa-regular fa-calendar me-1"></i>
                    <span th:text="${review.createdAt}"></span>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
