<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Mis pedidos')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <h1 class="section-title h2 mb-4">Listado de pedidos</h1>

    <div th:if="${#lists.isEmpty(purchases)}" class="empty-state text-center py-5">
        <i class="fa-solid fa-receipt fa-2x text-muted mb-3 d-block"></i>
        <h5 class="mb-1">Todavía no hay pedidos</h5>
        <p class="text-muted mb-3">Cuando finalices una compra aparecerá aquí.</p>
        <a th:href="@{/products}" class="btn btn-primary"><i class="fa-solid fa-store me-1"></i> Ir a la tienda</a>
    </div>

    <div class="card" th:unless="${#lists.isEmpty(purchases)}">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">#</th>
                    <th><i class="fa-regular fa-calendar me-1"></i> Fecha</th>
                    <th><i class="fa-solid fa-euro-sign me-1"></i> Total</th>
                    <th>Estado</th>
                    <th class="text-end pe-4">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="purchase : ${purchases}">
                    <td class="ps-4 fw-semibold" th:text="'#' + ${purchase.id}"></td>
                    <td th:text="${purchase.purchaseDate != null} ? ${#temporals.format(purchase.purchaseDate, 'dd/MM/yyyy HH:mm')} : '—'"></td>
                    <td class="fw-semibold" th:text="${#numbers.formatDecimal(purchase.totalPrice,1,2)} + ' €'"></td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${purchase.status != null and purchase.status.name() == 'PENDING'} ? 'text-bg-warning' : (${purchase.status != null and purchase.status.name() == 'IN_PROGRESS'} ? 'text-bg-info' : 'text-bg-success')"
                              th:text="${purchase.status != null and purchase.status.name() == 'PENDING'} ? 'Pendiente' : (${purchase.status != null and purchase.status.name() == 'IN_PROGRESS'} ? 'En curso' : 'Finalizado')">Estado</span>
                    </td>
                    <td class="text-end pe-4">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/purchases/{id}(id=${purchase.id})}">
                            <i class="fa-solid fa-eye me-1"></i> Ver
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
